<svg width="1600" height="570" viewBox="0 0 1600 570" fill="none"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="projectBg" x1="0" y1="0" x2="1600" y2="570"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="55%" stop-color="#0A1221"/>
      <stop offset="100%" stop-color="#09101D"/>
    </linearGradient>

    <linearGradient id="projectBorder" x1="0" y1="0" x2="1600" y2="570"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="projectAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="projectGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="projectScanlines" width="8" height="8"
             patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
  </defs>

  <!-- outer background -->
  <rect width="1600" height="570" rx="24" fill="url(#projectBg)"/>

  <rect x="1" y="1" width="1598" height="568" rx="23"
        stroke="url(#projectBorder)"
        stroke-opacity="0.55"
        stroke-width="2"/>

  <!-- grid -->
  <g opacity="0.08">
    <path d="M0 95H1600M0 190H1600M0 285H1600M0 380H1600M0 475H1600"
          stroke="#38BDF8"/>
    <path d="M160 0V570M320 0V570M480 0V570M640 0V570M800 0V570M960 0V570M1120 0V570M1280 0V570M1440 0V570"
          stroke="#1D4ED8"/>
  </g>

  <!-- header -->
  <rect x="28" y="24" width="1544" height="52" rx="14"
        fill="#0E172A" stroke="#334155"/>

  <circle cx="56" cy="50" r="6" fill="#22D3EE">
