<svg width="1600" height="230" viewBox="0 0 1600 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1600" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="55%" stop-color="#0A1221"/>
      <stop offset="100%" stop-color="#09101D"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1600" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="waveGrad" x1="60" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="45%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="waveGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="smallGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#FFFFFF" opacity="0.04"/>
    </pattern>

    <clipPath id="waveClip">
      <rect x="54" y="72" width="1010" height="108" rx="10"/>
    </clipPath>

    <clipPath id="spectrumClip">
      <rect x="1090" y="72" width="448" height="108" rx="10"/>
    </clipPath>
  </defs>

  <!-- outer panel -->
  <rect width="1600" height="230" rx="24" fill="url(#panelBg)"/>
  <rect x="1" y="1" width="1598" height="228" rx="23"
        stroke="url(#borderGrad)" stroke-opacity="0.55" stroke-width="2"/>

  <!-- top header -->
  <rect x="28" y="22" width="1544" height="38" rx="11"
        fill="#0E172A" stroke="#273449"/>

  <circle cx="50" cy="41" r="5.5" fill="#22D3EE">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="70" cy="41" r="5.5" fill="#8B5CF6">
    <animate attributeName="opacity" values="0.45;1;0.45" dur="2.7s" repeatCount="indefinite"/>
  </circle>

  <circle cx="90" cy="41" r="5.5" fill="#60A5FA">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <text x="112" y="47"
        fill="#94A3B8"
        font-family="monospace"
        font-size="18">
    realtime-instrument-monitor / signal-analysis
  </text>

  <text x="1170" y="47"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    sample: 48.0 kHz | trigger: auto | buffer: stable
  </text>

  <!-- waveform block -->
  <rect x="44" y="70" width="1030" height="118" rx="12"
        fill="#0B1324" stroke="#1E293B"/>

  <text x="64" y="94"
        fill="#60A5FA"
        font-family="monospace"
        font-size="17">
    OSCILLOSCOPE_TRACE
  </text>

  <text x="848" y="94"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    CH-A · 2.0 V/div · 10 ms/div
  </text>

  <!-- oscilloscope grid -->
  <g clip-path="url(#waveClip)" opacity="0.16">
    <path d="M64 106H1052M64 126H1052M64 146H1052M64 166H1052"
          stroke="#38BDF8" stroke-width="1"/>

    <path d="M124 100V178M224 100V178M324 100V178M424 100V178M524 100V178M624 100V178M724 100V178M824 100V178M924 100V178M1024 100V178"
          stroke="#38BDF8" stroke-width="1"/>
  </g>

  <!-- reference center line -->
  <path d="M64 142H1052"
        stroke="#64748B"
        stroke-width="1"
        stroke-dasharray="6 7"
        opacity="0.36"/>

  <!-- reference signal -->
  <path d="M64 148
           C100 148 102 132 138 132
           C174 132 176 152 212 152
           C248 152 250 138 286 138
           C322 138 324 150 360 150
           C396 150 398 134 434 134
           C470 134 472 150 508 150
           C544 150 546 137 582 137
           C618 137 620 151 656 151
           C692 151 694 135 730 135
           C766 135 768 149 804 149
           C840 149 842 136 878 136
           C914 136 916 151 952 151
           C988 151 992 141 1052 141"
        stroke="#8B5CF6"
        stroke-width="1.8"
        fill="none"
        opacity="0.42"/>

  <!-- primary scope signal -->
  <path d="M64 142
           L104 142
           C118 142 124 120 142 120
           C160 120 168 143 188 143
           L228 143
           C244 143 252 106 274 106
           C296 106 306 169 332 169
           C358 169 368 127 392 127
           C416 127 424 145 452 145
           L500 145
           C518 145 526 116 548 116
           C570 116 580 162 604 162
           C628 162 638 128 662 128
           C686 128 694 143 722 143
           L770 143
           C790 143 798 111 822 111
           C846 111 856 166 882 166
           C908 166 918 126 944 126
           C970 126 980 143 1052 143"
        stroke="url(#waveGrad)"
        stroke-width="3.8"
        fill="none"
        filter="url(#waveGlow)"
        clip-path="url(#waveClip)">
    <animate attributeName="d"
      dur="4.4s"
      repeatCount="indefinite"
      values="
      M64 142 L104 142 C118 142 124 120 142 120 C160 120 168 143 188 143 L228 143 C244 143 252 106 274 106 C296 106 306 169 332 169 C358 169 368 127 392 127 C416 127 424 145 452 145 L500 145 C518 145 526 116 548 116 C570 116 580 162 604 162 C628 162 638 128 662 128 C686 128 694 143 722 143 L770 143 C790 143 798 111 822 111 C846 111 856 166 882 166 C908 166 918 126 944 126 C970 126 980 143 1052 143;
      M64 141 L104 141 C120 141 126 126 142 126 C158 126 168 142 188 142 L228 142 C246 142 254 112 274 112 C294 112 306 163 330 163 C354 163 366 132 390 132 C414 132 424 144 452 144 L500 144 C520 144 528 122 548 122 C568 122 580 157 602 157 C624 157 636 133 660 133 C684 133 694 142 722 142 L770 142 C790 142 800 118 822 118 C844 118 856 160 880 160 C904 160 916 131 942 131 C968 131 980 142 1052 142;
      M64 142 L104 142 C118 142 124 120 142 120 C160 120 168 143 188 143 L228 143 C244 143 252 106 274 106 C296 106 306 169 332 169 C358 169 368 127 392 127 C416 127 424 145 452 145 L500 145 C518 145 526 116 548 116 C570 116 580 162 604 162 C628 162 638 128 662 128 C686 128 694 143 722 143 L770 143 C790 143 798 111 822 111 C846 111 856 166 882 166 C908 166 918 126 944 126 C970 126 980 143 1052 143"/>
  </path>

  <!-- trigger marker -->
  <path d="M522 104L530 114H514L522 104Z" fill="#22D3EE" opacity="0.9"/>

  <!-- scanning cursor -->
  <line x1="90" y1="104" x2="90" y2="176"
        stroke="#7DD3FC"
        stroke-width="2"
        opacity="0.62"
        filter="url(#smallGlow)">
    <animate attributeName="x1" from="80" to="1040" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" from="80" to="1040" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- spectrum block -->
  <rect x="1084" y="70" width="464" height="118" rx="12"
        fill="#0B1324" stroke="#1E293B"/>

  <text x="1104" y="94"
        fill="#60A5FA"
        font-family="monospace"
        font-size="17">
    SPECTRUM_FIELD
  </text>

  <text x="1400" y="94"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    FFT · live
  </text>

  <!-- spectrum grid -->
  <g clip-path="url(#spectrumClip)" opacity="0.14">
    <path d="M1104 112H1526M1104 134H1526M1104 156H1526M1104 178H1526"
          stroke="#38BDF8"/>
    <path d="M1160 104V180M1220 104V180M1280 104V180M1340 104V180M1400 104V180M1460 104V180M1520 104V180"
          stroke="#38BDF8"/>
  </g>

  <!-- spectrum baseline -->
  <path d="M1104 174H1526"
        stroke="#64748B"
        stroke-width="1"
        opacity="0.35"/>

  <!-- spectrum peaks -->
  <g filter="url(#smallGlow)">
    <rect x="1116" y="158" width="14" height="16" rx="3" fill="#38BDF8"/>
    <rect x="1138" y="146" width="14" height="28" rx="3" fill="#60A5FA"/>
    <rect x="1160" y="126" width="14" height="48" rx="3" fill="#7DD3FC"/>
    <rect x="1182" y="109" width="14" height="65" rx="3" fill="#A78BFA"/>
    <rect x="1204" y="138" width="14" height="36" rx="3" fill="#22D3EE"/>
    <rect x="1226" y="153" width="14" height="21" rx="3" fill="#38BDF8"/>
    <rect x="1248" y="120" width="14" height="54" rx="3" fill="#8B5CF6"/>
    <rect x="1270" y="140" width="14" height="34" rx="3" fill="#60A5FA"/>
    <rect x="1292" y="158" width="14" height="16" rx="3" fill="#22D3EE"/>
    <rect x="1314" y="148" width="14" height="26" rx="3" fill="#38BDF8"/>
    <rect x="1336" y="132" width="14" height="42" rx="3" fill="#60A5FA"/>
    <rect x="1358" y="102" width="14" height="72" rx="3" fill="#C4B5FD"/>
    <rect x="1380" y="136" width="14" height="38" rx="3" fill="#22D3EE"/>
    <rect x="1402" y="150" width="14" height="24" rx="3" fill="#38BDF8"/>
    <rect x="1424" y="124" width="14" height="50" rx="3" fill="#8B5CF6"/>
    <rect x="1446" y="145" width="14" height="29" rx="3" fill="#60A5FA"/>
    <rect x="1468" y="160" width="14" height="14" rx="3" fill="#22D3EE"/>
    <rect x="1490" y="151" width="14" height="23" rx="3" fill="#38BDF8"/>
  </g>

  <!-- moving highlight -->
  <rect x="1110" y="103" width="34" height="72" rx="10"
        fill="url(#spectrumGrad)"
        opacity="0.08"
        clip-path="url(#spectrumClip)">
    <animate attributeName="x" from="1106" to="1500" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.13;0" dur="4.8s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom status strip -->
  <rect x="44" y="196" width="1504" height="22" rx="7"
        fill="#0C1526" stroke="#1E293B"/>

  <g font-family="monospace" font-size="12.5">
    <circle cx="65" cy="207" r="4" fill="#22D3EE">
      <animate attributeName="opacity" values="1;0.45;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="76" y="211" fill="#94A3B8">acquisition online</text>

    <circle cx="226" cy="207" r="4" fill="#60A5FA">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="237" y="211" fill="#94A3B8">channel sync</text>

    <circle cx="356" cy="207" r="4" fill="#8B5CF6">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <text x="367" y="211" fill="#94A3B8">agent telemetry</text>

    <text x="1220" y="211" fill="#475569">
      node: XMU-LAB-01 · packet loss: 0.00% · latency: 12 ms
    </text>
  </g>

  <!-- scanline overlay -->
  <rect width="1600" height="230" rx="24"
        fill="url(#scanlines)" opacity="0.13"/>

  <rect x="-1600" y="0" width="1600" height="230" rx="24"
        fill="url(#scanlines)" opacity="0.07">
    <animate attributeName="x" from="-1600" to="1600" dur="8.5s" repeatCount="indefinite"/>
  </rect>
</svg>