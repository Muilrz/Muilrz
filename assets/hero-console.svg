<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="55%" stop-color="#0A1221"/>
      <stop offset="100%" stop-color="#09101D"/>
    </linearGradient>

    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="textGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9CC9FF"/>
      <stop offset="60%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#FFFFFF" opacity="0.045"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1600" height="720" rx="26" fill="url(#bgGrad)"/>

  <!-- subtle grid -->
  <g opacity="0.12">
    <path d="M0 88H1600M0 176H1600M0 264H1600M0 352H1600M0 440H1600M0 528H1600M0 616H1600" stroke="#38BDF8" stroke-width="1"/>
    <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720M1200 0V720M1320 0V720M1440 0V720" stroke="#1D4ED8" stroke-width="1"/>
