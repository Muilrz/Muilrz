        <rect x="0.7" y="0.7" width="178.6" height="46.6" rx="23.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <circle cx="28" cy="24" r="15" fill="#FFFFFF" fill-opacity="0.09"/>
        <path d="M28 17L30 22L35 24L30 26L28 31L26 26L21 24L26 22L28 17Z" fill="#FFFFFF" fill-opacity="0.85"/>
        <text x="54" y="30" fill="#FFFFFF" fill-opacity="0.76" font-size="13" font-weight="500">AI × Instrument</text>
      </g>
    </g>

    <!-- small ecosystem card -->
    <g transform="translate(870 118)" class="display">
      <rect width="288" height="142" rx="28" fill="url(#glassFill)"/>
      <rect x="0.7" y="0.7" width="286.6" height="140.6" rx="27.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
      <circle cx="34" cy="34" r="13" fill="#FFFFFF" fill-opacity="0.1"/>
      <path d="M29 34H39M34 29V39" stroke="#FFFFFF" stroke-opacity="0.8" stroke-linecap="round"/>
      <text x="24" y="74" fill="#FFFFFF" font-size="18" font-weight="500">MetaInstrument Studio</text>
      <text x="24" y="102" fill="#FFFFFF" fill-opacity="0.52" font-size="12.5">End-to-End AI Platform for </text>
      <text x="24" y="122" fill="#FFFFFF" fill-opacity="0.52" font-size="12.5">Scientific Instrument Development.</text>
    </g>

    <!-- subtle metadata -->
    <g class="display">
      <text x="1195" y="142" fill="#FFFFFF" fill-opacity="0.22" font-size="10" letter-spacing="2">> LAB NODE / XMU </text>
      <text x="1195" y="164" fill="#FFFFFF" fill-opacity="0.22" font-size="10" letter-spacing="2">> BUILD / Prof. Ren's group</text>
      <text x="1195" y="186" fill="#FFFFFF" fill-opacity="0.22" font-size="10" letter-spacing="2">> SESSION / Liu Ming</text>
    </g>

    <!-- PROJECTS OUTER PANEL -->
    <g transform="translate(870 300)" class="display">
      <rect width="682" height="372" rx="40" fill="url(#glassFillStrong)" filter="url(#softShadow)"/>
      <rect x="0.7" y="0.7" width="680.6" height="370.6" rx="39.3" stroke="url(#glassStroke)" stroke-width="1.4"/>

      <text x="30" y="48" fill="#FFFFFF" fill-opacity="0.46" font-size="11" font-weight="500" letter-spacing="3">ONGOING PROJECTS</text>
      <text x="30" y="83" fill="#FFFFFF" font-size="27" font-weight="500" letter-spacing="-1.2">Selected work in progress</text>

      <!-- two feature cards -->
      <g transform="translate(28 108)">
        <rect width="301" height="112" rx="27" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="299.6" height="110.6" rx="26.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <circle cx="33" cy="32" r="15" fill="#FFFFFF" fill-opacity="0.09"/>
        <path d="M27 35L31 31L34 34L40 27" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="58" y="37" fill="#FFFFFF" font-size="17" font-weight="500" class="serif">i-SENSIT</text>
        <text x="126" y="37" fill="#FFFFFF" font-size="17" font-weight="500">_Upper_PC</text>
        <text x="24" y="72" fill="#FFFFFF" fill-opacity="0.52" font-size="12">Multi-instrument control software</text>
        <text x="24" y="91" fill="#FFFFFF" fill-opacity="0.52" font-size="12">OOP layer + FSM + EDA/Pub-Sub.</text>
      </g>

      <g transform="translate(353 108)">
        <rect width="301" height="112" rx="27" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="299.6" height="110.6" rx="26.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <circle cx="33" cy="32" r="15" fill="#FFFFFF" fill-opacity="0.09"/>
        <path d="M27 27H39V38H27V27Z" stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="1.3"/>
        <path d="M30 31H36M30 34H35" stroke="#FFFFFF" stroke-opacity="0.58" stroke-width="1.1" stroke-linecap="round"/>
        <text x="58" y="37" fill="#FFFFFF" font-size="17" font-weight="500">SDK_Anlysis_Agent</text>
        <text x="24" y="72" fill="#FFFFFF" fill-opacity="0.52" font-size="12">Read SDK documentation and turn</text>
        <text x="24" y="91" fill="#FFFFFF" fill-opacity="0.52" font-size="12">it into reliable engineering context.</text>
      </g>

<!-- bottom two feature cards -->
<g transform="translate(28 238)">
  <rect width="301" height="112" rx="27" fill="url(#glassFill)"/>
  <rect x="0.7" y="0.7" width="299.6" height="110.6" rx="26.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>

  <circle cx="33" cy="32" r="15" fill="#FFFFFF" fill-opacity="0.09"/>
  <path d="M27 35L31 31L34 34L40 27" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="58" y="37" fill="#FFFFFF" font-size="17" font-weight="500">AI-Inst-Dev Platform  </text>
  <text x="24" y="72" fill="#FFFFFF" fill-opacity="0.52" font-size="12">An AI-Assisted Development Platform </text>
  <text x="24" y="91" fill="#FFFFFF" fill-opacity="0.52" font-size="12">for Instrument Control Software.</text>
</g>

<g transform="translate(353 238)">
  <rect width="301" height="112" rx="27" fill="url(#glassFill)"/>
  <rect x="0.7" y="0.7" width="299.6" height="110.6" rx="26.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>

  <circle cx="33" cy="32" r="15" fill="#FFFFFF" fill-opacity="0.09"/>
  <path d="M27 27H39V38H27V27Z" stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="1.3"/>
  <path d="M30 31H36M30 34H35" stroke="#FFFFFF" stroke-opacity="0.58" stroke-width="1.1" stroke-linecap="round"/>

  <text x="58" y="37" fill="#FFFFFF" font-size="17" font-weight="500">Rapid_Optics_Studio</text>
  <text x="24" y="72" fill="#FFFFFF" fill-opacity="0.52" font-size="12">A rapid prototyping / visualization tool for </text>
  <text x="24" y="91" fill="#FFFFFF" fill-opacity="0.52" font-size="12">spectroscopic instrument optical layouts.</text>
</g>
