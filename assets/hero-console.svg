<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;1,500&amp;family=Source+Serif+4:ital,wght@1,400;1,500&amp;display=swap');
      .display { font-family: 'Poppins', Arial, sans-serif; }
      .serif { font-family: 'Source Serif 4', Georgia, serif; font-style: italic; }
    </style>

    <linearGradient id="background" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.48" stop-color="#111111"/>
      <stop offset="1" stop-color="#030303"/>
    </linearGradient>

    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(410 320) rotate(35) scale(680 520)">
      <stop stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="rightGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 110) rotate(125) scale(470 620)">
      <stop stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.055"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.012"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.035"/>
    </linearGradient>

    <linearGradient id="glassFillStrong" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="0.52" stop-color="#FFFFFF" stop-opacity="0.018"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/>
    </linearGradient>

    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="0.2" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="0.62" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="0.82" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.5"/>
    </linearGradient>

    <linearGradient id="glassStrokeLight" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="0.22" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="0.44" stop-color="#FFFFFF" stop-opacity="0.025"/>
      <stop offset="0.65" stop-color="#FFFFFF" stop-opacity="0.025"/>
      <stop offset="0.82" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.42"/>
    </linearGradient>

    <filter id="blurLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>

    <pattern id="grain" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="17" cy="24" r="1" fill="#FFFFFF" opacity="0.05"/>
      <circle cx="88" cy="37" r="0.8" fill="#FFFFFF" opacity="0.035"/>
      <circle cx="142" cy="93" r="1" fill="#FFFFFF" opacity="0.04"/>
      <circle cx="44" cy="131" r="0.7" fill="#FFFFFF" opacity="0.04"/>
      <circle cx="113" cy="152" r="0.8" fill="#FFFFFF" opacity="0.03"/>
    </pattern>

    <clipPath id="frameClip">
      <rect width="1600" height="720" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="1600" height="720" fill="url(#background)"/>
    <rect width="1600" height="720" fill="url(#leftGlow)"/>
    <rect width="1600" height="720" fill="url(#rightGlow)"/>
    <rect width="1600" height="720" fill="url(#grain)" opacity="0.65"/>

    <!-- abstract monochrome bloom forms -->
    <g opacity="0.62" filter="url(#blurLarge)">
      <ellipse cx="1260" cy="235" rx="238" ry="90" transform="rotate(-18 1260 235)" fill="#FFFFFF" fill-opacity="0.065"/>
      <ellipse cx="1390" cy="355" rx="218" ry="72" transform="rotate(26 1390 355)" fill="#FFFFFF" fill-opacity="0.055"/>
      <ellipse cx="1185" cy="425" rx="180" ry="60" transform="rotate(54 1185 425)" fill="#FFFFFF" fill-opacity="0.045"/>
    </g>

    <!-- split divider -->
    <path d="M832 38V682" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <!-- LEFT STRONG GLASS PANEL -->
    <rect x="24" y="24" width="784" height="672" rx="34" fill="url(#glassFillStrong)" filter="url(#softShadow)"/>
    <rect x="24.7" y="24.7" width="782.6" height="670.6" rx="33.3" stroke="url(#glassStroke)" stroke-width="1.4"/>
    <path d="M58 25H775" stroke="#FFFFFF" stroke-opacity="0.11"/>

    <!-- nav -->
    <g class="display">
      <g transform="translate(58 56)">
        <circle cx="18" cy="18" r="17.5" fill="#FFFFFF" fill-opacity="0.08"/>
        <circle cx="18" cy="18" r="17" stroke="url(#glassStrokeLight)"/>
        <path d="M11 23V12L18 20L25 12V23" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="106" y="82" fill="#FFFFFF" font-size="24" font-weight="600" letter-spacing="-1.2">Muil</text>

      <g transform="translate(674 50)">
        <rect width="102" height="46" rx="23" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="100.6" height="44.6" rx="22.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <path d="M24 17H38M24 23H38M24 29H38" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.5" stroke-linecap="round" transform="translate(-10 0)"/>
        <text x="35" y="29" fill="#FFFFFF" fill-opacity="0.8" font-size="13" font-weight="500">Liu Ming</text>
      </g>
    </g>

    <!-- hero icon: circular liquid-glass L M monogram -->
    <g transform="translate(82 161)" class="display">
      <circle cx="40" cy="0" r="39.3" fill="url(#glassFillStrong)" filter="url(#shadow)"/>
      <circle cx="40" cy="0" r="39" stroke="url(#glassStroke)" stroke-width="1.4"/>
      <path d="M17 17C29 7 51 7 63 17" transform="translate(0 -40)" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.2" stroke-linecap="round"/>
      <text x="40" y="8" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.92" font-size="23" font-weight="600" letter-spacing="-1">L M</text>
    </g>

    <!-- hero title -->
    <g class="display">
      <text x="82" y="272" fill="#FFFFFF" font-size="68" font-weight="500" letter-spacing="-3.8">AI application</text>
      <text x="82" y="342" fill="#FFFFFF" font-size="68" font-weight="500" letter-spacing="-3.8">engineering for</text>
      <text x="82" y="412" fill="#FFFFFF" font-size="68" font-weight="500" letter-spacing="-3.8">scientific </text>
      <text x="389" y="422" fill="#ffffff" fill-opacity="0.78" font-size="70" font-weight="400" class="serif">instruments.</text>

      <text x="84" y="465" fill="#FFFFFF" fill-opacity="0.58" font-size="15" font-weight="400" letter-spacing="0.5">INSTRUMENT CONTROL SOFTWARE · RAG · AGENTS · AI DOCUMENT ANALYSIS</text>
    </g>

    <!-- skill pills + CTA -->
    <g transform="translate(82 511)" class="display">
      <g>
        <rect width="126" height="46" rx="23" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="124.6" height="44.6" rx="22.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <text x="63" y="29" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.78" font-size="12">C++ / Qt</text>
      </g>
      <g transform="translate(138 0)">
        <rect width="126" height="46" rx="23" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="124.6" height="44.6" rx="22.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <text x="63" y="29" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.78" font-size="12">Python / AI</text>
      </g>
      <g transform="translate(276 0)">
        <rect width="126" height="46" rx="23" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="124.6" height="44.6" rx="22.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <text x="63" y="29" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.78" font-size="12">C/Linux</text>
      </g>

      <g transform="translate(420 -6)">
        <rect width="190" height="58" rx="29" fill="url(#glassFillStrong)" filter="url(#shadow)"/>
        <rect x="0.7" y="0.7" width="188.6" height="56.6" rx="28.3" stroke="url(#glassStroke)" stroke-width="1.4"/>
        <text x="24" y="36" fill="#FFFFFF" font-size="14" font-weight="500">Explore my work</text>
        <circle cx="161" cy="29" r="14" fill="#FFFFFF" fill-opacity="0.13"/>
        <path d="M156 29H166M162 25L166 29L162 33" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- bottom quote -->
    <g class="display" transform="translate(0 -10)">
      <text x="82" y="628" fill="#FFFFFF" fill-opacity="0.42" font-size="11" font-weight="500" letter-spacing="3.2">SCIENTIFIC AI LAB</text>
      <text x="82" y="661" fill="#FFFFFF" fill-opacity="0.86" font-size="21" font-weight="500">Building AI-native tools for</text>
      <text x="375" y="661" fill="#FFFFFF" fill-opacity="0.68" font-size="22" class="serif">scientific instrument development.</text>
    </g>

    <!-- RIGHT TOP BAR -->
    <g class="display">
      <g transform="translate(870 40)">
        <rect width="204" height="48" rx="24" fill="url(#glassFill)"/>
        <rect x="0.7" y="0.7" width="202.6" height="46.6" rx="23.3" stroke="url(#glassStrokeLight)" stroke-width="1.4"/>
        <circle cx="31" cy="24" r="15" fill="#FFFFFF" fill-opacity="0.08"/>
        <text x="26" y="29" fill="#FFFFFF" fill-opacity="0.8" font-size="14" font-weight="600">G</text>
        <text x="58" y="30" fill="#FFFFFF" fill-opacity="0.72" font-size="13">github.com/Muilrz</text>
