    <!-- tiny floating particles -->
    <g fill="#FFFFFF">
      <circle cx="1550" cy="142" r="1.4" opacity="0.35"><animate attributeName="opacity" values="0.18;0.55;0.18" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="1210" cy="274" r="1.1" opacity="0.28"><animate attributeName="opacity" values="0.12;0.44;0.12" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="846" cy="616" r="1.2" opacity="0.25"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.6s" repeatCount="indefinite"/></circle>
