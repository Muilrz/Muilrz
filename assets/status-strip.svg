<svg width="1600" height="120" viewBox="0 0 1600 120" fill="none"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="stripBg" x1="0" y1="0" x2="1600" y2="120"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A14"/>
      <stop offset="50%" stop-color="#0A1221"/>
      <stop offset="100%" stop-color="#09101D"/>
    </linearGradient>

    <linearGradient id="stripBorder" x1="0" y1="0" x2="1600" y2="120"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="stripGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="stripScanline" width="8" height="8"
             patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="transparent"/>
      <rect y="0" width="8" height="1" fill="#FFFFFF" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1600" height="120" rx="20" fill="url(#stripBg)"/>

  <rect x="1" y="1" width="1598" height="118" rx="19"
        stroke="url(#stripBorder)"
        stroke-opacity="0.52"
        stroke-width="2"/>

  <!-- left identity -->
  <text x="36" y="42"
        fill="#7DD3FC"
        font-family="monospace"
        font-size="18"
        font-weight="700">
    LIU_MING@INSTRUMENT_AI_LAB
  </text>

  <text x="36" y="72"
        fill="#64748B"
        font-family="monospace"
        font-size="14">
    AI Application Engineering × Scientific Instrument Software
  </text>

  <!-- status indicators -->
  <g font-family="monospace" font-size="14">

    <circle cx="650" cy="38" r="5" fill="#22D3EE"
            filter="url(#stripGlow)">
      <animate attributeName="opacity"
               values="1;0.35;1"
               dur="2.2s"
               repeatCount="indefinite"/>
    </circle>

    <text x="665" y="43" fill="#94A3B8">
      system online
    </text>

    <circle cx="790" cy="38" r="5" fill="#60A5FA">
      <animate attributeName="opacity"
               values="0.45;1;0.45"
               dur="2.7s"
               repeatCount="indefinite"/>
    </circle>

    <text x="805" y="43" fill="#94A3B8">
      research active
    </text>

    <circle cx="946" cy="38" r="5" fill="#8B5CF6">
      <animate attributeName="opacity"
               values="1;0.45;1"
               dur="1.9s"
               repeatCount="indefinite"/>
    </circle>

    <text x="961" y="43" fill="#94A3B8">
      agent runtime ready
    </text>
  </g>

  <!-- thin signal trace -->
  <path d="M640 77
           H678
           C690 77 695 60 710 60
           C725 60 730 79 746 79
           H783
           C798 79 804 52 824 52
           C844 52 851 90 873 90
           C895 90 902 67 923 67
           C944 67 952 78 978 78
           H1015
           C1030 78 1038 59 1056 59
           C1074 59 1082 82 1103 82
           H1142"
        stroke="url(#stripBorder)"
        stroke-width="2.5"
        fill="none"
        filter="url(#stripGlow)"
        opacity="0.85">
    <animate attributeName="opacity"
             values="0.55;1;0.55"
             dur="3.2s"
             repeatCount="indefinite"/>
  </path>

  <!-- right metadata -->
  <text x="1200" y="42"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    node: XMU-LAB-01
  </text>

  <text x="1200" y="67"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    session: MAIN-PROFILE
  </text>

  <text x="1200" y="92"
        fill="#64748B"
        font-family="monospace"
        font-size="13">
    © 2026 Liu Ming
  </text>

  <!-- bottom terminal prompt -->
  <text x="36" y="101"
        fill="#475569"
        font-family="monospace"
        font-size="13">
    user@instrument-ai-lab:~$ building the next scientific engineering workflow
  </text>

  <rect x="571" y="89" width="8" height="15" rx="1" fill="#7DD3FC">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1.1s"
             repeatCount="indefinite"/>
  </rect>

  <rect width="1600" height="120" rx="20"
        fill="url(#stripScanline)"
        opacity="0.12"/>
</svg>